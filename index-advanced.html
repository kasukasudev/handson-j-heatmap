<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>日本人口ビュー（拡張版）</title>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --subtle: #475569;
      --border: #dbe2ea;
      --accent: #0369a1;
      --empty: #e2e8f0;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans JP", sans-serif;
      color: var(--text);
      background: var(--bg);
    }
    .container {
      max-width: 1120px;
      margin: 24px auto;
      padding: 0 16px 32px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.08);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 1.6rem;
    }
    p {
      margin: 0 0 12px;
      color: var(--subtle);
      line-height: 1.5;
    }
    .tab-list {
      display: flex;
      gap: 8px;
      margin: 14px 0 16px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
      flex-wrap: wrap;
    }
    .tab-btn {
      border: 1px solid var(--border);
      background: #fff;
      color: var(--subtle);
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 0.95rem;
      cursor: pointer;
      font-weight: 600;
    }
    .tab-btn[aria-selected="true"] {
      background: #e0f2fe;
      border-color: #7dd3fc;
      color: #0c4a6e;
    }
    .tab-panel[hidden] { display: none; }
    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    label { font-weight: 600; }
    select {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 1rem;
      background: #fff;
    }
    #status {
      color: var(--accent);
      font-weight: 600;
      min-height: 1.2em;
    }
    .big-number-wrap {
      display: grid;
      grid-template-columns: 1fr;
      gap: 4px;
      margin: 0 0 14px;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #f8fafc;
    }
    .big-number-label {
      color: var(--subtle);
      font-weight: 700;
      font-size: 0.9rem;
    }
    .big-number-title {
      font-size: 1.4rem;
      font-weight: 700;
    }
    .big-number-value {
      font-size: clamp(2.2rem, 5vw, 4rem);
      font-weight: 800;
      line-height: 1.1;
      color: #0c4a6e;
      letter-spacing: 0.02em;
    }
    #map {
      width: 100%;
      height: auto;
      display: block;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
    }
    .legend-wrap { margin-top: 12px; }
    .legend-title {
      margin-bottom: 6px;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--subtle);
    }
    #tooltip {
      position: fixed;
      pointer-events: none;
      padding: 8px 10px;
      border-radius: 8px;
      background: rgba(15, 23, 42, 0.92);
      color: #fff;
      font-size: 0.9rem;
      line-height: 1.4;
      visibility: hidden;
      transform: translate(10px, 10px);
      white-space: nowrap;
      z-index: 999;
    }
    .gender-message {
      margin-top: 8px;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid #facc15;
      background: #fefce8;
      color: #713f12;
      line-height: 1.6;
    }
    .footnote {
      margin-top: 12px;
      font-size: 0.85rem;
      color: var(--subtle);
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>日本の都道府県別人口ビュー（拡張版）</h1>
      <p>タブで表示を切り替えできます。人口タブでは、選択した都道府県の人口を大きく表示します。</p>

      <div class="tab-list" role="tablist" aria-label="表示切り替えタブ">
        <button class="tab-btn" id="tab-population" role="tab" aria-selected="true" aria-controls="panel-population">人口ヒートマップ</button>
        <button class="tab-btn" id="tab-gender" role="tab" aria-selected="false" aria-controls="panel-gender">男女比</button>
      </div>

      <section id="panel-population" class="tab-panel" role="tabpanel" aria-labelledby="tab-population">
        <div class="controls">
          <label for="year-select">表示年:</label>
          <select id="year-select" aria-label="表示年"></select>
          <span id="status"></span>
        </div>

        <div class="big-number-wrap" aria-live="polite">
          <div class="big-number-label">選択中の都道府県人口</div>
          <div id="selected-prefecture" class="big-number-title">都道府県をクリックしてください</div>
          <div id="selected-population" class="big-number-value">— 人</div>
        </div>

        <svg id="map" viewBox="0 0 960 640" role="img" aria-label="日本地図の人口ヒートマップ"></svg>

        <div class="legend-wrap">
          <div class="legend-title">人口（人）</div>
          <svg id="legend" width="960" height="56" aria-hidden="true"></svg>
        </div>
      </section>

      <section id="panel-gender" class="tab-panel" role="tabpanel" aria-labelledby="tab-gender" hidden>
        <p>都道府県別の男女比を表示するタブです。</p>
        <div id="gender-status" class="gender-message" role="status" aria-live="polite">男女比データの確認中...</div>
      </section>

      <div class="footnote">
        人口データ: <code>data/population.json</code>（e-Stat国勢調査） / 地図データ:
        <a href="https://github.com/dataofjapan/land" target="_blank" rel="noopener noreferrer">dataofjapan/land</a>
      </div>
    </section>
  </main>

  <div id="tooltip"></div>

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script>
    const POPULATION_LOCAL_URL = "data/population.json";
    const POPULATION_FALLBACK_URL = "https://raw.githubusercontent.com/DaBo-jp/handson-j-heatmap/main/data/population.json";
    const GEOJSON_URL = "https://raw.githubusercontent.com/dataofjapan/land/master/japan.geojson";
    const GENDER_RATIO_LOCAL_URL = "data/gender-ratio.json";

    const MAP_WIDTH = 960;
    const MAP_HEIGHT = 640;
    const MARGIN = 16;
    const EMPTY_COLOR = "#e2e8f0";

    const yearSelect = document.getElementById("year-select");
    const statusEl = document.getElementById("status");
    const tooltipEl = document.getElementById("tooltip");
    const selectedPrefEl = document.getElementById("selected-prefecture");
    const selectedPopulationEl = document.getElementById("selected-population");
    const genderStatusEl = document.getElementById("gender-status");

    const tabPopulation = document.getElementById("tab-population");
    const tabGender = document.getElementById("tab-gender");
    const panelPopulation = document.getElementById("panel-population");
    const panelGender = document.getElementById("panel-gender");

    const svg = d3.select("#map");
    const mapLayer = svg.append("g").attr("transform", `translate(${MARGIN}, ${MARGIN})`);
    const legendSvg = d3.select("#legend");

    const formatPopulation = d3.format(",");

    function normalizePrefCode(id) {
      return String(id).padStart(2, "0");
    }

    function toPopulationMapByYear(populationJson) {
      const mapByYear = new Map();
      for (const [year, entries] of Object.entries(populationJson)) {
        const byPref = new Map();
        for (const entry of entries) {
          byPref.set(normalizePrefCode(entry.id), entry);
        }
        mapByYear.set(year, byPref);
      }
      return mapByYear;
    }

    async function loadPopulationData() {
      try {
        const data = await d3.json(POPULATION_LOCAL_URL);
        statusEl.textContent = "";
        return data;
      } catch (error) {
        statusEl.textContent = "ローカルJSONの読み込みに失敗したため、オンラインデータを使用しています。";
        return d3.json(POPULATION_FALLBACK_URL);
      }
    }

    async function checkGenderRatioData() {
      try {
        await d3.json(GENDER_RATIO_LOCAL_URL);
        genderStatusEl.textContent = "男女比データを読み込みました。現時点では表示機能は準備中です。";
      } catch (error) {
        genderStatusEl.textContent = "男女比データは未提供です。data/gender-ratio.json を追加すると、このタブで表示できるように拡張できます。";
      }
    }

    function activateTab(tabName) {
      const isPopulation = tabName === "population";
      tabPopulation.setAttribute("aria-selected", String(isPopulation));
      tabGender.setAttribute("aria-selected", String(!isPopulation));
      panelPopulation.hidden = !isPopulation;
      panelGender.hidden = isPopulation;
    }

    function renderLegend(scale, min, max) {
      legendSvg.selectAll("*").remove();

      const gradientId = "legend-gradient-advanced";
      const defs = legendSvg.append("defs");
      const gradient = defs.append("linearGradient")
        .attr("id", gradientId)
        .attr("x1", "0%")
        .attr("x2", "100%")
        .attr("y1", "0%")
        .attr("y2", "0%");

      const steps = 10;
      for (let i = 0; i <= steps; i += 1) {
        const t = i / steps;
        const value = min + (max - min) * t;
        gradient.append("stop")
          .attr("offset", `${t * 100}%`)
          .attr("stop-color", scale(value));
      }

      const x = d3.scaleLinear().domain([min, max]).range([40, MAP_WIDTH - 40]);
      const axis = d3.axisBottom(x).ticks(6).tickFormat((d) => d3.format(",")(d));

      legendSvg.append("rect")
        .attr("x", 40)
        .attr("y", 8)
        .attr("width", MAP_WIDTH - 80)
        .attr("height", 12)
        .attr("rx", 6)
        .attr("fill", `url(#${gradientId})`);

      legendSvg.append("g")
        .attr("transform", "translate(0, 28)")
        .call(axis)
        .call((g) => g.select(".domain").attr("stroke", "#64748b"))
        .call((g) => g.selectAll("line").attr("stroke", "#94a3b8"))
        .call((g) => g.selectAll("text").attr("fill", "#475569").attr("font-size", 11));
    }

    function showTooltip(event, entry) {
      tooltipEl.style.visibility = "visible";
      tooltipEl.textContent = `${entry.name}: ${formatPopulation(entry.population)} 人`;
      tooltipEl.style.left = `${event.clientX}px`;
      tooltipEl.style.top = `${event.clientY}px`;
    }

    function hideTooltip() {
      tooltipEl.style.visibility = "hidden";
    }

    function updateBigNumber(entry) {
      if (!entry) {
        selectedPrefEl.textContent = "該当データがありません";
        selectedPopulationEl.textContent = "— 人";
        return;
      }
      selectedPrefEl.textContent = `${entry.name}（選択中）`;
      selectedPopulationEl.textContent = `${formatPopulation(entry.population)} 人`;
    }

    async function main() {
      tabPopulation.addEventListener("click", () => activateTab("population"));
      tabGender.addEventListener("click", () => activateTab("gender"));
      checkGenderRatioData();

      const [populationJson, geoJson] = await Promise.all([
        loadPopulationData(),
        d3.json(GEOJSON_URL),
      ]);

      const years = Object.keys(populationJson).sort((a, b) => Number(b) - Number(a));
      const populationByYear = toPopulationMapByYear(populationJson);

      yearSelect.innerHTML = "";
      for (const year of years) {
        const option = document.createElement("option");
        option.value = year;
        option.textContent = `${year}年`;
        yearSelect.appendChild(option);
      }

      const projection = d3.geoMercator().fitSize(
        [MAP_WIDTH - MARGIN * 2, MAP_HEIGHT - MARGIN * 2],
        geoJson
      );
      const path = d3.geoPath(projection);

      const prefecturePaths = mapLayer.selectAll("path")
        .data(geoJson.features)
        .join("path")
        .attr("d", path)
        .attr("stroke", "#ffffff")
        .attr("stroke-width", 1)
        .attr("fill", EMPTY_COLOR)
        .style("cursor", "pointer");

      function updateMap(year) {
        const dataByPref = populationByYear.get(year);
        const populations = Array.from(dataByPref.values(), (d) => d.population);
        const minPopulation = d3.min(populations);
        const maxPopulation = d3.max(populations);

        const colorScale = d3.scaleSequential(d3.interpolateYlOrRd)
          .domain([minPopulation, maxPopulation]);

        prefecturePaths
          .attr("fill", (feature) => {
            const prefCode = normalizePrefCode(feature.properties.id);
            const entry = dataByPref.get(prefCode);
            return entry ? colorScale(entry.population) : EMPTY_COLOR;
          })
          .on("mousemove", (event, feature) => {
            const prefCode = normalizePrefCode(feature.properties.id);
            const entry = dataByPref.get(prefCode);
            if (!entry) {
              hideTooltip();
              return;
            }
            showTooltip(event, entry);
          })
          .on("mouseleave", hideTooltip)
          .on("click", (_, feature) => {
            const prefCode = normalizePrefCode(feature.properties.id);
            const entry = dataByPref.get(prefCode);
            updateBigNumber(entry);
          });

        renderLegend(colorScale, minPopulation, maxPopulation);
        updateBigNumber(dataByPref.get("13") || dataByPref.values().next().value);
      }

      const initialYear = years[0];
      yearSelect.value = initialYear;
      updateMap(initialYear);

      yearSelect.addEventListener("change", (event) => {
        updateMap(event.target.value);
      });
    }

    main().catch((error) => {
      statusEl.textContent = "データの読み込みに失敗しました。ネットワーク接続を確認してください。";
      console.error(error);
    });
  </script>
</body>
</html>
